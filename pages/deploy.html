<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deploy static HTML, CSS, JavaScript, TSX, JSX pages in a secure sandboxed cloud platform powered by Vercel.">
    <title>Launch Platform - FishNemo Deployer</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div id="music-control" role="button" aria-label="Toggle background music">
        <svg id="play-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.647c1.295.742 1.295 2.545 0 3.286L7.279 20.99c-1.25.717-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
        </svg>
        <svg id="pause-icon" viewBox="0 0 24 24" style="display: none;" aria-hidden="true">
            <path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 01.75.75v12a.75.75 0 01-1.5 0v-12a.75.75 0 01.75-.75zm9 0a.75.75 0 01.75.75v12a.75.75 0 01-1.5 0v-12a.75.75 0 01.75-.75z" clip-rule="evenodd" />
        </svg>
    </div>
    <audio id="background-music" loop src="https://cdn.nefyu.my.id/rs7g.mp3"></audio>

    <div class="container">
        <header>
            <h1><a href="/"><span class="gradient-text">FishNemo</span> Deployer</a></h1>
            <p>Deploy static projects in seconds.</p>
        </header>

        <main>
            <div class="step-card" id="step1">
                <h2><span class="step-number">1</span> Upload Files</h2>
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-prompt">
                        <i class="fas fa-cloud-upload-alt" aria-hidden="true"></i>
                        <p>Drag & Drop files here</p>
                        <p class="small-text">(HTML, CSS, JS, JSX, TSX, or a ZIP file)</p>
                        <p>or</p>
                        <button id="browse-btn" class="browse-button" type="button">Browse Files</button>
                    </div>
                    <input type="file" id="file-input" multiple hidden aria-label="Project files uploader">
                </div>
                <div id="file-list-container">
                    <h3>Loaded Assets:</h3>
                    <ul id="file-list"></ul>
                </div>
                <div class="preview-button-container" style="margin-top: 20px; text-align: right;">
                    <button id="preview-btn" class="browse-button" disabled style="background-color: rgba(99, 102, 241, 0.1);" type="button">Check Preview</button>
                </div>
            </div>

            <div class="step-card" id="step2">
                <h2><span class="step-number">2</span> Launch Instance</h2>
                <div class="form-group">
                    <label for="subdomain-name">Choose a Project Name</label>
                    <input type="text" id="subdomain-name" placeholder="e.g., awesome-project" autocomplete="off" required>
                </div>
                
                <div class="url-preview">
                    <h4>Production Target Domain:</h4>
                    <p id="url-preview-text">...</p>
                </div>
                
                <button id="deploy-btn" class="deploy-button" disabled style="margin-top: 24px;" type="button">
                    <span class="button-text">Deploy Project</span>
                    <div class="loader" hidden></div>
                </button>
                <div id="status-message" role="status"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 FishNemo Deployer. All rights reserved.</p>
        </footer>
    </div>
    <script src="/script.js"></script>
</body>
</html>
