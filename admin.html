<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FishNemo Deployer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1><span class="gradient-text">Admin</span> Dashboard</h1>
                <p class="lead">Manage all deployed projects directly from Vercel.</p>
            </div>
            <button id="logout-btn" class="btn btn-outline-light" style="display: none;">Logout</button>
        </header>

        <div id="login-section" class="card bg-secondary p-4 text-center">
            <div class="card-body">
                <h2 class="card-title"><i class="fas fa-lock me-2"></i>Admin Login</h2>
                <div class="form-group my-3">
                    <input type="password" id="admin-password" class="form-control" placeholder="Enter Admin Password" autocomplete="current-password">
                </div>
                <button id="login-btn" class="btn btn-primary w-100">
                    <span class="button-text">Login</span>
                    <div class="loader" hidden></div>
                </button>
                <p id="login-error" class="text-danger mt-3" style="display: none;"></p>
            </div>
        </div>

        <div id="dashboard-section" class="card bg-secondary" style="display: none;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h2>All Deployments (<span id="total-deploys">0</span>)</h2>
                <button id="refresh-btn" class="btn btn-outline-light"><i class="fas fa-sync-alt me-2"></i>Refresh</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table id="deploys-table" class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>Project Name</th>
                                <th>Domain</th>
                                <th>Deployed At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" class="text-center">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
