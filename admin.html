<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FishNemo Deployer</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container" style="max-width: 1200px; animation: fadeIn 1s ease-in-out;">
        <header style="padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div id="header-title">
                <h1><span class="gradient-text">Admin</span> Dashboard</h1>
                <p style="color: var(--secondary-text-color);">Manage all deployed projects directly from Vercel.</p>
            </div>
            <button id="logout-btn" class="browse-button" style="display: none;">Logout</button>
        </header>

        <div id="login-section" class="step-card admin-login">
            <h2><i class="fas fa-lock" style="margin-right: 10px;"></i>Admin Login</h2>
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="Enter Admin Password" autocomplete="current-password">
            </div>
            <button id="login-btn" class="deploy-button">
                <span class="button-text">Login</span>
                <div class="loader" hidden></div>
            </button>
            <p id="login-error" style="color: var(--error-color); margin-top: 15px; display: none;"></p>
        </div>

        <div id="dashboard-section" class="step-card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>All Deployments (<span id="total-deploys">0</span>)</h2>
                <button id="refresh-btn" class="browse-button"><i class="fas fa-sync-alt" style="margin-right: 8px;"></i>Refresh</button>
            </div>
            <div class="admin-table-container">
                <table id="deploys-table" class="admin-table">
                    <thead>
                        <tr>
                            <th>Project Name</th>
                            <th>Domain</th>
                            <th>Deployed At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" style="text-align: center;">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/admin.js"></script>
</body>
</html>
